name: Release

on:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build-test-publish:
    name: Build, Test & Publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
            $version = $Matches[1]
            $versionArgs = "/p:Version=$version /p:PackageVersion=$version /p:AssemblyVersion=$version /p:FileVersion=$version"
            $isRelease = 'true'
            Write-Host "Stable release: $version"
          } else {
            $versionSuffix = "preview.${{ github.run_number }}"
            $versionArgs = "--version-suffix $versionSuffix"
            $isRelease = 'false'
            Write-Host "Pre-release with suffix: $versionSuffix"
          }
          "VERSION_ARGS=$versionArgs" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "IS_RELEASE=$isRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore dependencies
        run: dotnet restore source/AvalonDock.sln

      - name: Build
        run: dotnet build source/AvalonDock.sln --configuration Release --no-restore ${{ steps.version.outputs.VERSION_ARGS }}

      - name: Test
        run: >
          dotnet test source/AvalonDock.sln
          --configuration Release
          --no-restore
          --logger "trx;LogFilePrefix=test-results"
          --results-directory TestResults
          -m:1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx
          retention-days: 14

      - name: Collect NuGet packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path nupkg -Force | Out-Null
          Get-ChildItem -Path source/Components -Recurse -Filter "*.nupkg" | 
            Where-Object { $_.Directory.Name -eq "Release" } |
            Copy-Item -Destination nupkg/
          Get-ChildItem nupkg/*.nupkg | ForEach-Object { Write-Host "Found: $($_.Name)" }

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nupkg/*.nupkg
          retention-days: 30

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "nupkg/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        if: steps.version.outputs.IS_RELEASE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: nupkg/*.nupkg
