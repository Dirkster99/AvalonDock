name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore source/AvalonDock.sln

      - name: Build
        run: dotnet build source/AvalonDock.sln --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test source/AvalonDock.sln
          --configuration Release
          --no-restore
          --logger "trx;LogFilePrefix=test-results"
          --results-directory TestResults
          -m:1

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx
          retention-days: 14
